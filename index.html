<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Focus</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⏱</text></svg>">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Focus">
<meta name="theme-color" content="#F5F3EE" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141412" media="(prefers-color-scheme: dark)">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F3EE;
    --bg2: #EDEAE3;
    --bg3: #E2DED6;
    --surface: #FFFFFF;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.14);
    --text: #1A1917;
    --text2: #6B6860;
    --text3: #A09D98;
    --accent: #1A1917;
    --accent-text: #F5F3EE;
    --danger: #C0392B;
    --success: #2D7A4F;
    --radius: 14px;
    --radius-sm: 8px;
    --nav-h: 64px;
    --font-mono: 'DM Mono', monospace;
    --font-sans: 'DM Sans', sans-serif;
  }
  [data-theme="dark"] {
    --bg: #141412;
    --bg2: #1C1C19;
    --bg3: #242420;
    --surface: #1C1C19;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #F0EDE6;
    --text2: #888680;
    --text3: #555350;
    --accent: #F0EDE6;
    --accent-text: #141412;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  /* NAV */
  .nav {
    position: fixed;
    bottom: 0; left: 50%;
    transform: translateX(-50%);
    width: 100%; max-width: 480px;
    height: var(--nav-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    background: none; border: none; cursor: pointer;
    padding: 6px 16px;
    color: var(--text3);
    font-size: 10px;
    font-family: var(--font-sans);
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .nav-btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn.active { color: var(--text); }
  .nav-btn.active svg { stroke-width: 2; }

  /* SCREENS */
  .screen { display: none; padding: 24px 20px calc(var(--nav-h) + 16px); min-height: 100vh; }
  .screen.active { display: block; }

  /* HEADER ROW */
  .screen-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .screen-title {
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 400;
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* THEME TOGGLE */
  .theme-toggle {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.2s;
    display: flex; align-items: center; gap: 4px;
  }
  .theme-toggle:hover { background: var(--bg3); }

  /* ── TIMER SCREEN ── */
  .working-on-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--text);
    outline: none;
    margin-bottom: 28px;
    transition: border-color 0.2s;
  }
  .working-on-input::placeholder { color: var(--text3); }
  .working-on-input:focus { border-color: var(--border2); }

  /* Mode pills */
  .mode-pills {
    display: flex; gap: 6px; justify-content: center;
    margin-bottom: 32px;
  }
  .mode-pill {
    background: none;
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-pill.active {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }

  /* Timer ring */
  .timer-wrap {
    display: flex; justify-content: center;
    margin-bottom: 28px;
    position: relative;
  }
  .timer-ring-svg { transform: rotate(-90deg); }
  .timer-ring-bg { fill: none; stroke: var(--bg3); stroke-width: 4; }
  .timer-ring-progress {
    fill: none;
    stroke: var(--text);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear;
  }
  .timer-center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .timer-display {
    font-family: var(--font-mono);
    font-size: 40px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -1px;
    line-height: 1;
  }
  .timer-mode-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    margin-top: 6px;
  }

  /* Timer buttons */
  .timer-btns {
    display: flex; gap: 10px; margin-bottom: 24px;
  }
  .btn-ghost {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 13px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-ghost:hover { background: var(--bg3); }
  .btn-primary {
    flex: 2;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 13px;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--accent-text);
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-primary:active { transform: scale(0.98); }

  /* Sound section */
  .sound-section {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .sound-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .sound-options {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .sound-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .sound-pill.active {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }
  .volume-row {
    display: flex; align-items: center; gap: 10px;
  }
  .vol-icon { color: var(--text3); font-size: 14px; flex-shrink: 0; }
  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }
  .vol-val {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    min-width: 28px;
    text-align: right;
  }

  /* ── TODO SCREEN ── */
  .todo-add-row {
    display: flex; gap: 8px; margin-bottom: 20px;
  }
  .todo-input {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }
  .todo-input::placeholder { color: var(--text3); }
  .todo-input:focus { border-color: var(--border2); }
  .btn-add {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    padding: 12px 16px;
    color: var(--accent-text);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    transition: opacity 0.15s;
  }
  .todo-list { display: flex; flex-direction: column; }
  .todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .todo-check {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border2);
    background: none;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .todo-check.done {
    background: var(--success);
    border-color: var(--success);
  }
  .todo-check.done::after {
    content: '';
    width: 5px; height: 9px;
    border-right: 2px solid white;
    border-bottom: 2px solid white;
    transform: rotate(40deg) translate(-1px, -1px);
    display: block;
  }
  .todo-text {
    flex: 1;
    font-size: 14px;
    color: var(--text);
    transition: all 0.3s;
  }
  .todo-text.done {
    text-decoration: line-through;
    color: var(--text3);
  }
  .todo-del {
    background: none; border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .todo-item:hover .todo-del { opacity: 1; }
  .clear-btn {
    background: none; border: none;
    color: var(--text3);
    font-size: 12px;
    font-family: var(--font-mono);
    cursor: pointer;
    padding: 4px 0;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--danger); }
  .todo-footer {
    display: flex; justify-content: flex-end;
    margin-top: 16px;
  }
  .empty-state {
    text-align: center;
    padding: 40px 0;
    color: var(--text3);
    font-family: var(--font-mono);
    font-size: 13px;
    letter-spacing: 0.04em;
  }

  /* ── NOTES SCREEN ── */
  .note-capture {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .note-capture:focus-within { border-color: var(--border2); }
  .note-textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--text);
    resize: none;
    min-height: 60px;
    line-height: 1.6;
  }
  .note-textarea::placeholder { color: var(--text3); }
  .note-capture-footer {
    display: flex; justify-content: flex-end;
    margin-top: 8px;
  }
  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: var(--radius-sm);
    padding: 7px 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent-text);
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .notes-list { display: flex; flex-direction: column; gap: 10px; }
  .note-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    animation: fadeIn 0.2s ease;
  }
  .note-body {
    font-size: 14px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 10px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .note-footer {
    display: flex; justify-content: space-between; align-items: center;
  }
  .note-time {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
  }
  .note-actions { display: flex; gap: 10px; }
  .note-action-btn {
    background: none; border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 15px;
    padding: 2px;
    transition: color 0.2s;
    display: flex; align-items: center;
  }
  .note-action-btn:hover { color: var(--text); }
  .notes-header-actions {
    display: flex; gap: 8px; align-items: center;
  }
  .btn-export-all {
    background: none;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 5px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .btn-export-all:hover { border-color: var(--border2); color: var(--text); }

  /* ── STATS SCREEN ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--bg2);
    border-radius: var(--radius);
    padding: 16px;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stat-value {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 300;
    color: var(--text);
    line-height: 1;
    margin-bottom: 2px;
  }
  .stat-sub {
    font-size: 11px;
    color: var(--text3);
  }
  .session-log {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .session-log-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .session-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 16px;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .session-row:last-child { border-bottom: none; }
  .session-task { font-size: 13px; color: var(--text); }
  .session-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    text-align: right;
  }
  .session-count {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 2px;
  }
  .clear-stats-row {
    display: flex; justify-content: flex-end;
    margin-top: 12px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: calc(var(--nav-h) + 16px);
    left: 50%; transform: translateX(-50%);
    background: var(--text);
    color: var(--accent-text);
    padding: 10px 20px;
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 200;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  /* BREAK OVERLAY */
  .break-overlay {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 300;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .break-overlay.show { display: flex; }
  .break-title {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .break-time {
    font-family: var(--font-mono);
    font-size: 60px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -2px;
    margin-bottom: 32px;
  }
  .btn-skip {
    background: none;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 11px 28px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-skip:hover { background: var(--bg2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 0px; }

  /* ── SETTINGS MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 400;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 24px 20px 40px;
    width: 100%; max-width: 480px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }
  .modal-title {
    font-family: var(--font-mono);
    font-size: 11px; color: var(--text3);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .modal-close {
    background: none; border: none;
    color: var(--text3); font-size: 20px;
    cursor: pointer; line-height: 1; padding: 4px;
  }
  .settings-section { margin-bottom: 20px; }
  .settings-section-label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text3);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 10px;
  }
  .preset-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 8px; margin-bottom: 8px;
  }
  .preset-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    text-align: left; cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn.active { border-color: var(--text); background: var(--bg3); }
  .preset-name {
    font-family: var(--font-mono);
    font-size: 12px; color: var(--text); margin-bottom: 2px;
  }
  .preset-desc { font-size: 11px; color: var(--text3); }
  .custom-duration-row {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 8px; margin-top: 8px;
  }
  .duration-field label {
    display: block; font-family: var(--font-mono);
    font-size: 10px; color: var(--text3);
    letter-spacing: 0.06em; margin-bottom: 4px;
  }
  .duration-input {
    width: 100%; background: var(--bg2);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 8px 10px; font-family: var(--font-mono);
    font-size: 14px; color: var(--text); outline: none; text-align: center;
    transition: border-color 0.2s;
  }
  .duration-input:focus { border-color: var(--border2); }
  .btn-apply {
    width: 100%; margin-top: 16px; background: var(--accent);
    border: none; border-radius: var(--radius); padding: 13px;
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    color: var(--accent-text); cursor: pointer;
  }

  /* ── AUTOCOMPLETE ── */
  .working-on-wrap { position: relative; margin-bottom: 20px; }
  .autocomplete-list {
    position: absolute; top: 100%; left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius-sm); z-index: 50; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12); display: none;
  }
  .autocomplete-list.show { display: block; }
  .autocomplete-item {
    padding: 10px 14px; font-size: 14px; color: var(--text);
    cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.1s;
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover { background: var(--bg2); }

  /* ── NOTE EDIT ── */
  .note-edit-textarea {
    width: 100%; background: transparent; border: none; outline: none;
    font-family: var(--font-sans); font-size: 14px; color: var(--text);
    resize: none; line-height: 1.6; min-height: 60px;
  }
  .note-edit-actions {
    display: flex; gap: 8px; justify-content: flex-end; margin-top: 8px;
  }
  .btn-cancel {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 6px 14px; font-family: var(--font-mono);
    font-size: 12px; color: var(--text2); cursor: pointer;
  }

  /* ── WEEKLY STATS ── */
  .stats-tabs {
    display: flex; gap: 4px; background: var(--bg2);
    border-radius: var(--radius-sm); padding: 4px; margin-bottom: 20px;
  }
  .stats-tab {
    flex: 1; background: none; border: none; border-radius: 6px; padding: 7px;
    font-family: var(--font-mono); font-size: 12px; color: var(--text3);
    cursor: pointer; transition: all 0.15s;
  }
  .stats-tab.active {
    background: var(--surface); color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }
  .week-bar-chart {
    background: var(--bg2); border-radius: var(--radius);
    padding: 16px; margin-bottom: 20px;
  }
  .week-bars {
    display: flex; align-items: flex-end;
    gap: 6px; height: 80px; margin-bottom: 8px;
  }
  .week-bar-col {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    gap: 4px; height: 100%; justify-content: flex-end;
  }
  .week-bar {
    width: 100%; background: var(--bg3); border-radius: 4px 4px 0 0;
    min-height: 3px; transition: height 0.3s ease;
  }
  .week-bar.today { background: var(--text); }
  .week-bar-label { font-family: var(--font-mono); font-size: 9px; color: var(--text3); }
  .week-bar-val { font-family: var(--font-mono); font-size: 9px; color: var(--text2); margin-bottom: 2px; }

  /* ── POMODORO COUNTER ── */
  .pomo-counter {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-bottom: 20px;
  }
  .pomo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--bg3);
    border: 1.5px solid var(--border2);
    transition: all 0.3s ease;
  }
  .pomo-dot.done { background: var(--text); border-color: var(--text); }
  .pomo-dot.long { background: var(--success); border-color: var(--success); width: 10px; height: 10px; }
  .pomo-label {
    font-family: var(--font-mono);
    font-size: 10px; color: var(--text3);
    letter-spacing: 0.08em; margin-left: 4px;
  }

  /* ── STOP & SAVE ── */
  .btn-done {
    flex: 1;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 13px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-done:hover { background: var(--bg3); color: var(--text); }
  .session-partial {
    font-size: 10px;
    color: var(--text3);
    font-family: var(--font-mono);
    margin-left: 4px;
  }

  /* ── NOTE TYPE ── */
  .note-type-row {
    display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .note-type-pill {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .note-type-pill.active {
    background: var(--accent);
    color: var(--accent-text);
    border-color: var(--accent);
  }

  /* ── CARRY-OVER MODAL ── */
  .carryover-list {
    display: flex; flex-direction: column; gap: 2px;
    max-height: 300px; overflow-y: auto;
    margin-bottom: 16px;
  }
  .carryover-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .carryover-item:last-child { border-bottom: none; }
  .carryover-cb {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .carryover-cb.checked {
    background: var(--accent); border-color: var(--accent);
  }
  .carryover-cb.checked::after {
    content: '';
    width: 4px; height: 8px;
    border-right: 2px solid var(--accent-text);
    border-bottom: 2px solid var(--accent-text);
    transform: rotate(40deg) translate(-1px,-1px);
    display: block;
  }
  .carryover-text { font-size: 14px; color: var(--text); flex: 1; }
  .carryover-actions {
    display: flex; gap: 6px; margin-bottom: 16px;
  }
  .btn-sm {
    background: none; border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 6px 14px; font-family: var(--font-mono);
    font-size: 11px; color: var(--text2); cursor: pointer;
    transition: all 0.15s;
  }
  .btn-sm:hover { background: var(--bg2); }

  /* ── DRAG TO REORDER ── */
  .todo-item {
    cursor: grab;
  }
  .todo-item.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }
  .todo-item.drag-over {
    border-top: 2px solid var(--text);
  }
  .drag-handle {
    color: var(--text3);
    cursor: grab;
    padding: 4px 6px;
    font-size: 16px;
    flex-shrink: 0;
    line-height: 1;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }


  /* Settings gear btn */
  .gear-btn {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 10px; cursor: pointer; font-size: 14px; color: var(--text2);
    transition: all 0.2s; display: flex; align-items: center;
  }
  .gear-btn:hover { background: var(--bg3); }
  .header-actions { display: flex; gap: 6px; align-items: center; }
</style>
</head>

<script>
// ── STATE ──────────────────────────────────────────────
const S = {
  timer: { running: false, mode: 'focus', total: 25*60, remaining: 25*60, interval: null },
  sound: { current: null, ctx: null, nodes: [] },
  data: JSON.parse(localStorage.getItem('focusApp') || '{}'),
  selectedPreset: 'classic'
};
if (!S.data.todos) S.data.todos = [];
if (!S.data.notes) S.data.notes = [];
if (!S.data.sessions) S.data.sessions = [];
if (!S.data.settings) S.data.settings = { theme: 'system', workMin: 25, shortMin: 5, longMin: 15, sound: null, volume: 50, lastTask: '' };
if (!S.data.settings.workMin) { S.data.settings.workMin = 25; S.data.settings.shortMin = 5; S.data.settings.longMin = 15; }
if (!S.data.settings.lastTask) S.data.settings.lastTask = '';
// Restore last task and timer durations
S.timer.total = S.data.settings.workMin * 60;
S.timer.remaining = S.data.settings.workMin * 60;
// Session count for long break trigger
if (!S.data.settings.dailySessionCount) S.data.settings.dailySessionCount = 0;
if (!S.data.settings.sessionCountDate) S.data.settings.sessionCountDate = '';
// Reset count if it's a new day
const _today = new Date().toDateString();
if (S.data.settings.sessionCountDate !== _today) {
  S.data.settings.dailySessionCount = 0;
  S.data.settings.sessionCountDate = _today;
  save();
}

// ── THEME ──────────────────────────────────────────────
function applyTheme() {
  const pref = S.data.settings.theme;
  const isDark = pref === 'dark' || (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.body.setAttribute('data-theme', isDark ? 'dark' : 'light');
  const icon = isDark ? '☀' : '☾';
  ['theme-icon','theme-icon2','theme-icon3','theme-icon4'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = icon;
  });
}
function toggleTheme() {
  const cur = S.data.settings.theme;
  const isDark = cur === 'dark' || (cur === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  S.data.settings.theme = isDark ? 'light' : 'dark';
  save(); applyTheme();
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
applyTheme();

// Update pomo counter on load
updatePomoCounter();

// Restore last task
const savedTask = S.data.settings.lastTask || '';
if (savedTask) document.getElementById('working-on').value = savedTask;

// Restore saved sound
const savedSound = S.data.settings.sound;
const savedVol = S.data.settings.volume || 50;
document.getElementById('vol-slider').value = savedVol;
document.getElementById('vol-val').textContent = savedVol;
if (savedSound) {
  document.querySelectorAll('.sound-pill').forEach(p => p.classList.remove('active'));
  const el = document.getElementById('snd-' + savedSound);
  if (el) el.classList.add('active');
  S.sound.current = savedSound;
  // Don't auto-play — require user interaction first
}

// Restore preset label
const wm = S.data.settings.workMin;
if (wm === 25) S.selectedPreset = 'classic';
else if (wm === 50) S.selectedPreset = 'long';
else if (wm === 90) S.selectedPreset = 'deep';
else S.selectedPreset = 'custom';

// ── SAVE ──────────────────────────────────────────────
function save() { localStorage.setItem('focusApp', JSON.stringify(S.data)); }

// Save task label on input
document.getElementById('working-on').addEventListener('input', function() {
  S.data.settings.lastTask = this.value;
  save();
});

// ── NAV ──────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'stats') renderStats();
}

// ── TIMER ──────────────────────────────────────────────
const CIRC = 2 * Math.PI * 88; // 552.9

function getMins(mode) {
  if (mode === 'focus') return S.data.settings.workMin || 25;
  if (mode === 'short') return S.data.settings.shortMin || 5;
  if (mode === 'long') return S.data.settings.longMin || 15;
  return 25;
}
function setMode(mode, mins) {
  if (S.timer.running) { clearInterval(S.timer.interval); S.timer.running = false; }
  S.timer.mode = mode;
  const m = mins !== undefined ? mins : getMins(mode);
  S.timer.total = m * 60;
  S.timer.remaining = m * 60;
  document.getElementById('start-btn').textContent = 'start';
  document.querySelectorAll('.mode-pill').forEach(p => p.classList.remove('active'));
  document.getElementById('pill-' + (mode === 'focus' ? 'focus' : mode === 'short' ? 'short' : 'long')).classList.add('active');
  const labels = { focus: 'FOCUS', short: 'SHORT BREAK', long: 'LONG BREAK' };
  document.getElementById('timer-label').textContent = labels[mode] || 'FOCUS';
  updateDisplay();
}

function updateDisplay() {
  const m = Math.floor(S.timer.remaining / 60);
  const s = S.timer.remaining % 60;
  document.getElementById('timer-display').textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  const progress = 1 - S.timer.remaining / S.timer.total;
  document.getElementById('ring').style.strokeDashoffset = CIRC * (1 - progress);
}

function toggleTimer() {
  if (S.timer.mode !== 'focus' && !S.timer.running && S.timer.remaining === S.timer.total) {
    // Starting a break — no done btn
  }
  if (S.timer.running) {
    clearInterval(S.timer.interval);
    S.timer.running = false;
    document.getElementById('start-btn').textContent = 'resume';
  } else {
    S.timer.running = true;
    S.timer._startedAt = S.timer._startedAt || Date.now();
    document.getElementById('start-btn').textContent = 'pause';
    S.timer.interval = setInterval(tick, 1000);
  }
  // Show done btn only when focus session is running or paused mid-session
  const inFocus = S.timer.mode === 'focus' && S.timer.remaining < S.timer.total;
  document.getElementById('done-btn').style.display = inFocus ? 'flex' : 'none';
}

function tick() {
  S.timer.remaining--;
  updateDisplay();
  if (S.timer.remaining <= 0) {
    clearInterval(S.timer.interval);
    S.timer.running = false;
    onTimerEnd();
  }
}

function onTimerEnd() {
  if (S.timer.mode === 'focus') {
    // Log session
    const label = document.getElementById('working-on').value.trim() || 'Untitled';
    const today = new Date().toDateString();
    const existing = S.data.sessions.find(s => s.label === label && s.date === today);
    if (existing) { existing.count = (existing.count || 1) + 1; existing.lastTime = fmtTime(); }
    else { S.data.sessions.push({ id: Date.now(), label, date: today, count: 1, lastTime: fmtTime() }); }
    // Increment daily session count
    if (S.data.settings.sessionCountDate !== today) {
      S.data.settings.dailySessionCount = 0;
      S.data.settings.sessionCountDate = today;
    }
    S.data.settings.dailySessionCount = (S.data.settings.dailySessionCount || 0) + 1;
    save();
    updatePomoCounter();
    // Every 4th session → long break
    const isLongBreak = S.data.settings.dailySessionCount % 4 === 0;
    if (isLongBreak) {
      notify('🎉 4 sessions done! Time for a long break.');
      startBreak('long');
    } else {
      notify('🍅 Focus session complete! Take a short break.');
      startBreak('short');
    }
  } else {
    notify('Break over. Ready to focus?');
    setMode('focus');
  }
}

function updatePomoCounter() {
  const today = new Date().toDateString();
  if (S.data.settings.sessionCountDate !== today) return;
  const count = S.data.settings.dailySessionCount || 0;
  const posInCycle = count % 4; // 0 = just finished 4th
  for (let i = 1; i <= 4; i++) {
    const dot = document.getElementById('pomo-dot-' + i);
    if (!dot) continue;
    dot.className = 'pomo-dot';
    if (posInCycle === 0 && count > 0) {
      // Just completed a full cycle — briefly show all done
      dot.classList.add('long');
    } else if (i <= posInCycle) {
      dot.classList.add('done');
    }
  }
  const label = document.getElementById('pomo-label');
  if (label) {
    const inCycle = posInCycle === 0 && count > 0 ? 4 : posInCycle;
    label.textContent = inCycle + ' / 4';
  }
}

function startBreak(type) {
  const mins = type === 'short' ? (S.data.settings.shortMin || 5) : (S.data.settings.longMin || 15);
  const overlay = document.getElementById('break-overlay');
  overlay.classList.add('show');
  document.getElementById('break-label').textContent = type === 'short' ? 'SHORT BREAK' : 'LONG BREAK';
  let rem = mins * 60;
  updateBreakDisplay(rem);
  S.timer._breakInterval = setInterval(() => {
    rem--;
    updateBreakDisplay(rem);
    if (rem <= 0) { clearInterval(S.timer._breakInterval); skipBreak(); }
  }, 1000);
}

function updateBreakDisplay(rem) {
  const m = String(Math.floor(rem/60)).padStart(2,'0');
  const s = String(rem%60).padStart(2,'0');
  document.getElementById('break-display').textContent = m+':'+s;
}

function skipBreak() {
  clearInterval(S.timer._breakInterval);
  document.getElementById('break-overlay').classList.remove('show');
  setMode('focus');
}

function resetTimer() {
  clearInterval(S.timer.interval);
  S.timer.running = false;
  S.timer.remaining = S.timer.total;
  S.timer._startedAt = null;
  document.getElementById('start-btn').textContent = 'start';
  document.getElementById('done-btn').style.display = 'none';
  updateDisplay();
}

updateDisplay();

// ── STOP & SAVE ────────────────────────────────────────
function stopAndSave() {
  if (S.timer.mode !== 'focus') return;
  clearInterval(S.timer.interval);
  S.timer.running = false;

  const plannedSecs = S.timer.total;
  const actualSecs = plannedSecs - S.timer.remaining;
  if (actualSecs < 10) { // ignore accidental taps under 10s
    resetTimer();
    toast('Session too short to save');
    return;
  }
  const actualMins = Math.round(actualSecs / 60);
  const label = document.getElementById('working-on').value.trim() || 'Untitled';
  const today = new Date().toDateString();

  // Log as partial session
  const existing = S.data.sessions.find(s => s.label === label && s.date === today);
  if (existing) {
    existing.count = (existing.count || 1) + 1;
    existing.lastTime = fmtTime();
    existing.totalMinutes = (existing.totalMinutes || 0) + actualMins;
    if (!existing.detail) existing.detail = [];
    existing.detail.push({ planned: Math.round(plannedSecs/60), actual: actualMins, complete: false });
  } else {
    S.data.sessions.push({
      id: Date.now(), label, date: today, count: 1,
      lastTime: fmtTime(), totalMinutes: actualMins,
      detail: [{ planned: Math.round(plannedSecs/60), actual: actualMins, complete: false }]
    });
  }

  // Count toward long break cycle
  if (S.data.settings.sessionCountDate !== today) {
    S.data.settings.dailySessionCount = 0;
    S.data.settings.sessionCountDate = today;
  }
  S.data.settings.dailySessionCount = (S.data.settings.dailySessionCount || 0) + 1;
  save();
  updatePomoCounter();

  toast(`Saved ${actualMins} min · ${label}`);
  S.timer._startedAt = null;
  document.getElementById('done-btn').style.display = 'none';
  document.getElementById('start-btn').textContent = 'start';
  S.timer.remaining = S.timer.total;
  updateDisplay();
}

// ── SOUND (Web Audio) ──────────────────────────────────
const SOUNDS = {
  rain: () => genRain(),
  white: () => genWhiteNoise(),
  forest: () => genForest(),
  cafe: () => genCafe()
};

function getAudioCtx() {
  if (!S.sound.ctx) S.sound.ctx = new (window.AudioContext || window.webkitAudioContext)();
  return S.sound.ctx;
}

function stopSound() {
  S.sound.nodes.forEach(n => { try { n.stop(); } catch(e){} });
  S.sound.nodes = [];
}

function selectSound(type) {
  stopSound();
  document.querySelectorAll('.sound-pill').forEach(p => p.classList.remove('active'));
  if (!type) { document.getElementById('snd-off').classList.add('active'); S.sound.current = null; S.data.settings.sound = null; save(); return; }
  document.getElementById('snd-' + type).classList.add('active');
  S.sound.current = type;
  S.data.settings.sound = type;
  save();
  const ctx = getAudioCtx();
  const vol = parseInt(document.getElementById('vol-slider').value) / 100;
  SOUNDS[type](ctx, vol);
}

function setVolume(v) {
  document.getElementById('vol-val').textContent = v;
  S.data.settings.volume = parseInt(v);
  save();
  if (S.sound.current) selectSound(S.sound.current);
}

function masterGain(ctx, vol) {
  const g = ctx.createGain();
  g.gain.value = vol * 0.4;
  g.connect(ctx.destination);
  return g;
}

function genRain(ctx, vol) {
  if (!ctx) { ctx = getAudioCtx(); vol = parseInt(document.getElementById('vol-slider').value)/100; }
  const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.8;
  const src = ctx.createBufferSource();
  src.buffer = buf;
  src.loop = true;
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass';
  filt.frequency.value = 1200;
  filt.Q.value = 0.5;
  const g = masterGain(ctx, vol);
  src.connect(filt); filt.connect(g);
  src.start();
  S.sound.nodes.push(src);
}

function genWhiteNoise(ctx, vol) {
  if (!ctx) { ctx = getAudioCtx(); vol = parseInt(document.getElementById('vol-slider').value)/100; }
  const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const g = masterGain(ctx, vol * 0.6);
  src.connect(g); src.start();
  S.sound.nodes.push(src);
}

function genForest(ctx, vol) {
  if (!ctx) { ctx = getAudioCtx(); vol = parseInt(document.getElementById('vol-slider').value)/100; }
  const g = masterGain(ctx, vol);
  // birds: oscillators with random freq modulation
  for (let i = 0; i < 4; i++) {
    setTimeout(() => {
      const osc = ctx.createOscillator();
      const oscGain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 1200 + Math.random() * 800;
      oscGain.gain.value = 0;
      osc.connect(oscGain); oscGain.connect(g);
      osc.start();
      // chirp pattern
      function chirp() {
        const t = ctx.currentTime;
        oscGain.gain.cancelScheduledValues(t);
        oscGain.gain.setValueAtTime(0, t);
        oscGain.gain.linearRampToValueAtTime(0.15, t + 0.05);
        oscGain.gain.linearRampToValueAtTime(0, t + 0.15);
        osc.frequency.setValueAtTime(1200 + Math.random()*800, t);
        setTimeout(chirp, 1500 + Math.random() * 3000);
      }
      setTimeout(chirp, Math.random() * 2000);
      S.sound.nodes.push(osc);
    }, i * 500);
  }
  // wind
  const buf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*0.3;
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.frequency.value = 400;
  const wg = ctx.createGain(); wg.gain.value = 0.3;
  src.connect(filt); filt.connect(wg); wg.connect(g);
  src.start();
  S.sound.nodes.push(src);
}

function genCafe(ctx, vol) {
  if (!ctx) { ctx = getAudioCtx(); vol = parseInt(document.getElementById('vol-slider').value)/100; }
  const g = masterGain(ctx, vol);
  // murmur: pink-ish noise
  const buf = ctx.createBuffer(2, ctx.sampleRate * 3, ctx.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    let b0=0,b1=0,b2=0;
    for (let i=0; i<d.length; i++) {
      const wn = Math.random()*2-1;
      b0 = 0.99886*b0 + wn*0.0555179;
      b1 = 0.99332*b1 + wn*0.0750759;
      b2 = 0.96900*b2 + wn*0.1538520;
      d[i] = (b0+b1+b2+wn*0.0288)*0.25;
    }
  }
  const src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true;
  const filt = ctx.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 600; filt.Q.value = 0.4;
  src.connect(filt); filt.connect(g);
  src.start();
  S.sound.nodes.push(src);
}

// ── DRAG TO REORDER ────────────────────────────────────
let dragSrc = null;

function addDragHandlers(el, id) {
  // Mouse drag
  el.setAttribute('draggable', 'true');
  el.addEventListener('dragstart', e => {
    dragSrc = id;
    setTimeout(() => el.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('.todo-item').forEach(i => i.classList.remove('drag-over'));
  });
  el.addEventListener('dragover', e => {
    e.preventDefault();
    document.querySelectorAll('.todo-item').forEach(i => i.classList.remove('drag-over'));
    if (dragSrc !== id) el.classList.add('drag-over');
  });
  el.addEventListener('drop', e => {
    e.preventDefault();
    if (dragSrc && dragSrc !== id) reorderTodo(dragSrc, id);
  });

  // Touch drag
  let touchStartY = 0;
  let touchItem = null;
  const handle = el.querySelector('.drag-handle');
  if (!handle) return;

  handle.addEventListener('touchstart', e => {
    e.preventDefault();
    e.stopPropagation();
    touchStartY = e.touches[0].clientY;
    el.classList.add('dragging');
    dragSrc = id;
  }, { passive: false });

  handle.addEventListener('touchmove', e => {
    e.preventDefault();
    e.stopPropagation();
    if (!dragSrc) return;
    const touch = e.touches[0];
    const y = touch.clientY;
    // Temporarily hide dragging el to get element underneath
    el.style.pointerEvents = 'none';
    const below = document.elementFromPoint(touch.clientX, y);
    el.style.pointerEvents = '';
    const targetEl = below ? below.closest('.todo-item') : null;
    document.querySelectorAll('.todo-item').forEach(i => i.classList.remove('drag-over'));
    if (targetEl && targetEl !== el) targetEl.classList.add('drag-over');
  }, { passive: false });

  handle.addEventListener('touchend', e => {
    e.preventDefault();
    el.classList.remove('dragging');
    const target = document.querySelector('.todo-item.drag-over');
    if (target && target !== el) {
      const targetId = target.dataset.id;
      if (targetId && dragSrc !== targetId) reorderTodo(dragSrc, targetId);
    }
    document.querySelectorAll('.todo-item').forEach(i => i.classList.remove('drag-over'));
    dragSrc = null;
  }, { passive: false });
}

function reorderTodo(srcId, targetId) {
  const todos = S.data.todos.filter(t => !t.done);
  const srcIdx = todos.findIndex(t => t.id === srcId);
  const tgtIdx = todos.findIndex(t => t.id === targetId);
  if (srcIdx === -1 || tgtIdx === -1) return;
  const [moved] = todos.splice(srcIdx, 1);
  todos.splice(tgtIdx, 0, moved);
  // Rebuild full todos array (preserve done items)
  const done = S.data.todos.filter(t => t.done);
  S.data.todos = [...todos, ...done];
  save(); renderTodos();
}

        <div class="note-actions">
          <button class="note-action-btn" onclick="editNote('${n.id}')" title="Edit" aria-label="Edit note">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="note-action-btn" onclick="exportNote('${n.id}')" title="Export as .md" aria-label="Export note">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
          <button class="note-action-btn" onclick="deleteNote('${n.id}')" title="Delete" aria-label="Delete note">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
    `;
    list.appendChild(div);
  });
}

function editNote(id) {
  const n = S.data.notes.find(n => n.id === id);
  if (!n) return;
  const card = document.getElementById('note-card-' + id);
  card.innerHTML = `
    <textarea class="note-edit-textarea" id="edit-ta-${id}" rows="4">${escHtml(n.text)}</textarea>
    <div class="note-edit-actions">
      <button class="btn-cancel" onclick="renderNotes()">cancel</button>
      <button class="btn-save" onclick="saveEditNote('${id}')">save</button>
    </div>
  `;
  const ta = document.getElementById('edit-ta-' + id);
  ta.focus();
  ta.setSelectionRange(ta.value.length, ta.value.length);
}

function saveEditNote(id) {
  const ta = document.getElementById('edit-ta-' + id);
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  const n = S.data.notes.find(n => n.id === id);
  if (n) { n.text = text; n.edited = fmtTime(); }
  save(); renderNotes();
}

function saveNote() {
  const inp = document.getElementById('note-input');
  const text = inp.value.trim();
  if (!text) return;
  const t = NOTE_TYPES[currentNoteType];
  S.data.notes.push({
    id: String(Date.now()), text, time: fmtTime(),
    type: currentNoteType, typeEmoji: t.emoji, typeLabel: t.label
  });
  inp.value = '';
  selectNoteType('general'); // reset to default
  save(); renderNotes();
}

function deleteNote(id) {
  S.data.notes = S.data.notes.filter(n => n.id !== id);
  save(); renderNotes();
}

function exportNote(id) {
  const n = S.data.notes.find(n => n.id === id);
  if (!n) return;
  const typeTag = n.typeLabel ? `\ntype: ${n.typeLabel}` : '';
  const md = `---\ncreated: ${new Date().toISOString().split('T')[0]}\ntime: ${n.time}${typeTag}\ntags: [focus-app${n.typeLabel ? ', ' + n.typeLabel.replace(' ','-') : ''}]\n---\n\n${n.text}\n`;
  downloadFile(`note-${n.id}.md`, md);
  toast('Exported to .md');
}

function exportAllNotes() {
  if (S.data.notes.length === 0) { toast('No notes to export'); return; }
  const md = S.data.notes.map(n =>
    `---\ncreated: ${new Date().toISOString().split('T')[0]}\ntime: ${n.time}\n---\n\n${n.text}\n`
  ).join('\n\n');
  downloadFile(`focus-notes-${new Date().toISOString().split('T')[0]}.md`, md);
  toast('All notes exported');
}

renderNotes();

// ── STATS ──────────────────────────────────────────────
function switchStatsTab(tab) {
  document.getElementById('tab-today').classList.toggle('active', tab === 'today');
  document.getElementById('tab-week').classList.toggle('active', tab === 'week');
  document.getElementById('stats-today-view').style.display = tab === 'today' ? 'block' : 'none';
  document.getElementById('stats-week-view').style.display = tab === 'week' ? 'block' : 'none';
  if (tab === 'week') renderWeekStats();
}

function renderStats() {
  const today = new Date().toDateString();
  const sessions = S.data.sessions.filter(s => s.date === today);
  const total = sessions.reduce((a, s) => a + (s.count || 1), 0);
  const focusMins = S.data.settings.workMin || 25;
  const mins = total * focusMins;
  document.getElementById('stat-count').textContent = total;
  if (mins >= 60) {
    document.getElementById('stat-time').textContent = (mins/60).toFixed(1);
    document.getElementById('stat-time-unit').textContent = 'hours today';
  } else {
    document.getElementById('stat-time').textContent = mins;
    document.getElementById('stat-time-unit').textContent = 'min today';
  }
  const logEl = document.getElementById('session-log-list');
  logEl.innerHTML = '';
  if (sessions.length === 0) {
    logEl.innerHTML = '<div class="empty-state" style="padding:20px;">no sessions yet today</div>';
    return;
  }
  sessions.forEach(s => {
    const row = document.createElement('div');
    row.className = 'session-row';
    const hasPartial = s.detail && s.detail.some(d => !d.complete);
    const actualLabel = s.totalMinutes ? `${s.totalMinutes} min actual` : '';
    row.innerHTML = `
      <span class="session-task">${escHtml(s.label)}${hasPartial ? ' <span class="session-partial">partial</span>' : ''}</span>
      <div class="session-meta">
        <div class="session-count">${s.count}× · ${actualLabel}</div>
        <div>${s.lastTime || ''}</div>
      </div>
    `;
    logEl.appendChild(row);
  });
}

function renderWeekStats() {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const today = new Date();
  const focusMins = S.data.settings.workMin || 25;
  // Build 7-day window
  const week = Array.from({length:7}, (_,i) => {
    const d = new Date(today);
    d.setDate(today.getDate() - (6-i));
    return { dateStr: d.toDateString(), label: days[d.getDay()], isToday: i===6 };
  });
  const counts = week.map(w => {
    const sessions = S.data.sessions.filter(s => s.date === w.dateStr);
    return sessions.reduce((a,s) => a + (s.count||1), 0);
  });
  const maxCount = Math.max(...counts, 1);
  // Render bars
  const barsEl = document.getElementById('week-bars');
  barsEl.innerHTML = week.map((w,i) => `
    <div class="week-bar-col">
      <div class="week-bar-val">${counts[i] || ''}</div>
      <div class="week-bar${w.isToday?' today':''}" style="height:${Math.max(4,(counts[i]/maxCount)*72)}px"></div>
      <div class="week-bar-label">${w.label}</div>
    </div>
  `).join('');
  // Week totals
  const weekTotal = counts.reduce((a,b)=>a+b,0);
  const weekMins = weekTotal * focusMins;
  document.getElementById('stat-week-count').textContent = weekTotal;
  if (weekMins >= 60) {
    document.getElementById('stat-week-time').textContent = (weekMins/60).toFixed(1);
    document.getElementById('stat-week-unit').textContent = 'hours';
  } else {
    document.getElementById('stat-week-time').textContent = weekMins;
    document.getElementById('stat-week-unit').textContent = 'min';
  }
  // Top tasks this week
  const weekDates = new Set(week.map(w => w.dateStr));
  const taskMap = {};
  S.data.sessions.filter(s => weekDates.has(s.date)).forEach(s => {
    taskMap[s.label] = (taskMap[s.label] || 0) + (s.count||1);
  });
  const sorted = Object.entries(taskMap).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const taskEl = document.getElementById('week-task-list');
  taskEl.innerHTML = sorted.length ? sorted.map(([label,count]) => `
    <div class="session-row">
      <span class="session-task">${escHtml(label)}</span>
      <div class="session-meta">
        <div class="session-count">${count}× total</div>
        <div>${count * focusMins} min</div>
      </div>
    </div>
  `).join('') : '<div class="empty-state" style="padding:20px;">no sessions this week</div>';
}

function clearStats() {
  const today = new Date().toDateString();
  S.data.sessions = S.data.sessions.filter(s => s.date !== today);
  save(); renderStats();
}

// ── HELPERS ──────────────────────────────────────────────
function fmtTime() {
  return new Date().toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function downloadFile(name, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/plain' }));
  a.download = name; a.click();
  URL.revokeObjectURL(a.href);
}

function notify(msg) {
  toast(msg);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Focus', { body: msg, icon: '' });
  } else if ('Notification' in window && Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── SERVICE WORKER REGISTRATION ──────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .catch(err => console.log('SW registration failed:', err));
  });
}
</script>
